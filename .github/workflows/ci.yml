name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests (unit + integration, no external APIs)
        env:
          # Fernet key generated fresh for CI — never a real production key
          DB_ENCRYPTION_KEY: ${{ secrets.CI_FERNET_KEY || '' }}
          # DATABASE_URL is faked — tests that need a real DB are marked @postgres and skipped
          DATABASE_URL: postgresql://fake:fake@localhost:5432/testdb
        run: |
          pytest tests/ -v -m "not external and not postgres" \
            --tb=short \
            --color=yes

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7
