<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f0f1a"/>
  <!-- Document body -->
  <rect x="6" y="4" width="16" height="20" rx="2" fill="white" opacity="0.95"/>
  <!-- Dog-ear fold -->
  <polygon points="18,4 22,4 22,8" fill="#764ba2"/>
  <polygon points="18,4 22,8 18,8" fill="#e8e4f0" opacity="0.6"/>
  <!-- Text lines on document -->
  <rect x="9" y="10" width="10" height="1.5" rx="0.75" fill="#667eea" opacity="0.5"/>
  <rect x="9" y="13.5" width="8" height="1.5" rx="0.75" fill="#667eea" opacity="0.4"/>
  <rect x="9" y="17" width="6" height="1.5" rx="0.75" fill="#667eea" opacity="0.3"/>
  <!-- AI node backdrop -->
