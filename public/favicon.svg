  <line x1="26.5" y1="20.5" x2="25.3" y2="21.3" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="17.5" y1="20.5" x2="18.7" y2="21.3" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
